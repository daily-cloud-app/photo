AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Daily Cloud Photo Backend
  Cognito + API Gateway + Lambda + S3 + DynamoDB

# ============================================================
# Parameters
# ============================================================
Parameters:
  AppName:
    Type: String
    Default: daily-cloud-photo
    Description: Application name (used as prefix for resource names)

  RequireEmail:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require email address for signup

  RequirePhone:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Require phone number for signup

  PhotosBucketName:
    Type: String
    Default: ''
    Description: S3 bucket name for photos (leave empty for auto-generated name)

  LambdaCodeBucket:
    Type: String
    Default: ''
    Description: S3 bucket containing the Lambda code ZIP (leave empty for auto-bootstrap from GitHub)

  LambdaCodeKey:
    Type: String
    Default: 'daily-cloud-photo/lambda.zip'
    Description: S3 key for the Lambda code ZIP file

  GitHubReleaseUrl:
    Type: String
    Default: 'https://github.com/daily-cloud-app/photo/releases/latest/download/lambda.zip'
    Description: URL to download Lambda ZIP from GitHub Releases (used when LambdaCodeBucket is empty)

  EnableShareUrl:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable share upload URL feature

  EnableLabelSharing:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable label sharing between users

  AppDisplayName:
    Type: String
    Default: 'Daily Cloud Photo Backend'
    Description: Display name returned by the /info endpoint

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref PhotosBucketName, '']]
  EmailRequired: !Equals [!Ref RequireEmail, 'true']
  NeedsBootstrap: !Equals [!Ref LambdaCodeBucket, '']

# ============================================================
# Resources
# ============================================================
Resources:

  # ── Cognito ──

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AppName}-user-pool'
      AutoVerifiedAttributes:
        - !If [EmailRequired, email, !Ref 'AWS::NoValue']
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: !If [EmailRequired, true, false]
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${AppName}-app-client'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ── S3 (Deploy — auto-created for Lambda code storage) ──

  DeployBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldZips
            Status: Enabled
            ExpirationInDays: 90

  # ── Bootstrap Lambda (downloads ZIP from GitHub to S3) ──

  BootstrapFunctionRole:
    Type: AWS::IAM::Role
    Condition: NeedsBootstrap
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${DeployBucket.Arn}/*'

  BootstrapFunction:
    Type: AWS::Lambda::Function
    Condition: NeedsBootstrap
    Properties:
      FunctionName: !Sub '${AppName}-bootstrap'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt BootstrapFunctionRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      bucket = event['ResourceProperties']['Bucket']
                      key = event['ResourceProperties']['Key']
                      boto3.client('s3').delete_object(Bucket=bucket, Key=key)
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  url = event['ResourceProperties']['SourceUrl']
                  bucket = event['ResourceProperties']['Bucket']
                  key = event['ResourceProperties']['Key']

                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      data = resp.read()

                  boto3.client('s3').put_object(
                      Bucket=bucket,
                      Key=key,
                      Body=data,
                  )

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'Bucket': bucket,
                      'Key': key,
                  })
              except Exception as e:
                  print(f'Error: {e}')
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  BootstrapInvocation:
    Type: Custom::BootstrapLambda
    Condition: NeedsBootstrap
    Properties:
      ServiceToken: !GetAtt BootstrapFunction.Arn
      SourceUrl: !Ref GitHubReleaseUrl
      Bucket: !Ref DeployBucket
      Key: !Ref LambdaCodeKey

  # ── S3 (Photos) ──

  PhotosBucket:
    Type: AWS::S3::Bucket
    DependsOn: S3TriggerPermission
    Properties:
      BucketName: !If
        - UseCustomBucketName
        - !Ref PhotosBucketName
        - !Sub '${AppName}-photos-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: 's3:ObjectCreated:*'
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: 'users/'
            Function: !GetAtt S3TriggerFunction.Arn

  # ── DynamoDB ──

  PhotosTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${AppName}-photos'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: photoId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: photoId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: photoId-index
          KeySchema:
            - AttributeName: photoId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── IAM Role for Lambda ──

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminInitiateAuth
                  - cognito-idp:AdminGetUser
                  - cognito-idp:SignUp
                  - cognito-idp:ConfirmSignUp
                  - cognito-idp:InitiateAuth
                  - cognito-idp:GetUser
                  - cognito-idp:ListUsers
                Resource: !GetAtt CognitoUserPool.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:HeadObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${AppName}-photos-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${AppName}-photos-${AWS::AccountId}/*'
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt PhotosTable.Arn
                  - !Sub '${PhotosTable.Arn}/index/*'

  # ── Lambda ──

  ApiFunction:
    Type: AWS::Lambda::Function
    DependsOn: BootstrapInvocation
    Properties:
      FunctionName: !Sub '${AppName}-api'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !If [NeedsBootstrap, !Ref DeployBucket, !Ref LambdaCodeBucket]
        S3Key: !Ref LambdaCodeKey
      Environment:
        Variables:
          USER_POOL_ID: !Ref CognitoUserPool
          USER_POOL_CLIENT_ID: !Ref CognitoUserPoolClient
          PHOTOS_BUCKET: !Ref PhotosBucket
          PHOTOS_TABLE: !Ref PhotosTable
          REQUIRE_EMAIL: !Ref RequireEmail
          REQUIRE_PHONE: !Ref RequirePhone
          ENABLE_SHARE_URL: !Ref EnableShareUrl
          ENABLE_LABEL_SHARING: !Ref EnableLabelSharing
          APP_DISPLAY_NAME: !Ref AppDisplayName

  # Allow API Gateway to invoke Lambda
  ApiFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  # ── S3 Trigger Lambda ──

  S3TriggerFunction:
    Type: AWS::Lambda::Function
    DependsOn: BootstrapInvocation
    Properties:
      FunctionName: !Sub '${AppName}-s3-trigger'
      Runtime: python3.12
      Handler: s3_trigger.handler
      Timeout: 60
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !If [NeedsBootstrap, !Ref DeployBucket, !Ref LambdaCodeBucket]
        S3Key: !Ref LambdaCodeKey
      Environment:
        Variables:
          PHOTOS_TABLE: !Ref PhotosTable

  S3TriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref S3TriggerFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref 'AWS::AccountId'
      SourceArn: !Sub 'arn:aws:s3:::${AppName}-photos-${AWS::AccountId}'

  # ── API Gateway (HTTP API) ──

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AppName}-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowHeaders: ['*']
        AllowMethods: ['*']
        AllowOrigins: ['*']

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: v1
      AutoDeploy: true

  # Lambda Integration
  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'

  # Route all requests to Lambda
  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${HttpApiIntegration}'

# ============================================================
# Outputs
# ============================================================
Outputs:
  ApiEndpoint:
    Description: API endpoint URL (give this to app users)
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/v1'

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient

  PhotosBucketName:
    Description: S3 bucket for photos
    Value: !Ref PhotosBucket
